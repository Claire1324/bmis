<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      color: #333;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    img {
      width: 60%;
      max-width: 500px;
      border-radius: 12px;
      margin: 20px 0;
    }

    .button-box {
      margin-top: 20px;
    }

    button {
      padding: 12px 24px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #333;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Explore the Unknown</h1>
    <p>A different view every time.</p>

    <img src="https://picsum.photos/500/300?random=21" alt="Home page image">
    <div class="button-box">
     <button onclick="window.location.href='2.html'">Click Here to Page 2</button>
     <button onclick="window.location.href='3.html'">Click Here to Page 3</button>
    </div>
  </div>
</body>
</html>
